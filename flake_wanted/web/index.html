<!doctype html>
<html lang="en">
<head>
  <script>
    class NUI {
      handlers = new Map();

      addHandler(name, handler) {
        const exist = this.handlers.get(name);
        if (exist) {
          console.warn(`[NUI] Handler ${name} already exists, overwriting`);
        }
        this.handlers.set(name, handler);
      }

      execHandler(name, data) {
        const handler = this.handlers.get(name);
        if (handler) {
          handler(data);
        }
      }
    }

    const nui = new NUI();

    // -- MAIN EVENT HANDLER: "showmug" --
    nui.addHandler("showmug", (data) => {
      // data.kind -> "wanted", "fbi", "jailed", or "raid"
      // data.data -> { firstName, lastName, reason, amount, ... }
      // data.mug  -> either "data:image/png;base64,..." OR just raw base64

      // 1) Mugshot
      let mugshotEl = document.getElementById("mugshot");
      if (!data.mug) {
        // If no mug, just hide the mugshot div
        mugshotEl.style.display = "none";
      } else {
        mugshotEl.style.display = "block";

        // If your data already has the prefix "data:image/png;base64,":
        //   document.getElementById("mugshot").style.backgroundImage = `url(${data.mug})`;
        //
        // If it's raw base64 with no prefix, forcibly add it:
        //   data.mug = "data:image/png;base64," + data.mug;
        // Or do a quick check:
        if (!data.mug.startsWith("data:image/png;base64,")) {
          data.mug = `data:image/png;base64,${data.mug}`;
        }
        mugshotEl.style.backgroundImage = `url(${data.mug})`;
      }

      // 2) Deconstruct the data from data.data
      //    If not found, defaults to an empty object to avoid errors
      const { firstName = "FName", lastName = "LName", reason = "", amount = "" } = data.data || {};

      // 3) Switch on the 'kind'
      switch (data.kind) {
        // If your server is sending "wanted" (not "flake_wanted"), rename the case:
        case "wanted":
          document.getElementById("banner").style.backgroundImage = `url(./pd.png)`;
          document.getElementById("notification").style.animation =
            "notify 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";

          const wantedStr = `
            <p>Wanted</p>
            <p style="font-size: 1.4em; color: #F44336; margin-top: -16px; margin-bottom: -8px;">
              ${firstName} ${lastName}
            </p>
            <p>If you see this person please contact 911 immediately!</p>
            <p style="color: #F44336; margin-top: -10px;">
              Wanted for ${reason}
            </p>`;

          document.getElementById("reason-text").innerHTML = wantedStr;

          setTimeout(() => {
            document.getElementById("notification").style.animation =
              "leave 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";
          }, 17000);
          break;

        case "fbi":
          document.getElementById("banner").style.backgroundImage = `url(./fbi.png)`;
          document.getElementById("notification").style.animation =
            "notify 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";

          const fbiStr = `
            <p style="font-size: 1.4em; color: #F44336; margin-top: 10px; margin-bottom: -8px;">
              ${firstName} ${lastName}
            </p>
            <p>All Assets have been seized by the Federal Bureau of Investigation in accord with a seizure warrant.</p>
          `;
          document.getElementById("reason-text").innerHTML = fbiStr;

          setTimeout(() => {
            document.getElementById("notification").style.animation =
              "leave 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";
          }, 17000);
          break;

        case "jailed":
          document.getElementById("banner").style.backgroundImage = `url(./jailed.png)`;
          document.getElementById("notification").style.animation =
            "notify 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";

          const jailedStr = `
            <p style="font-size: 1.4em; color: #F44336; margin-top: 0px; margin-bottom: -8px;">
              ${firstName} ${lastName}
            </p>
            <p>Has been sentenced to 
               <span style="font-size: 1.1em; color: #F44336;">
                 ${amount}
               </span> 
               months in state prison. 
               <br>Reason: 
               <span style="font-size: 1.1em; color: #F44336;">
                 ${reason}
               </span>.
            </p>`;
          document.getElementById("reason-text").innerHTML = jailedStr;

          setTimeout(() => {
            document.getElementById("notification").style.animation =
              "leave 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";
          }, 25000);
          break;

        case "raid":
          document.getElementById("banner").style.backgroundImage = `url(./raid.png)`;
          document.getElementById("notification").style.animation =
            "notify 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";

          const raidStr = `
            <p style="font-size: 1.4em; color: #F44336; margin-top: 2.2em; margin-bottom: -8px; text-align: center;">
              ${reason}
            </p>`;
          document.getElementById("reason-text").innerHTML = raidStr;

          setTimeout(() => {
            document.getElementById("notification").style.animation =
              "leave 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";
          }, 17000);
          break;

        default:
          // If some unknown "kind" is sent, just do a default
          console.warn("No matching case for kind:", data.kind);
          document.getElementById("notification").style.animation =
            "notify 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";
          document.getElementById("reason-text").innerHTML = `
            <p>Notification type not recognized.</p>
            <p>${firstName} ${lastName}</p>
            <p>Reason: ${reason}</p>
          `;
          setTimeout(() => {
            document.getElementById("notification").style.animation =
              "leave 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";
          }, 17000);
          break;
      }
    });

    // Forward 'message' events to our NUI logic
    window.addEventListener("message", (evt) => {
      if (evt.data.type) {
        nui.execHandler(evt.data.type, evt.data);
      }
    });

    // Debug function to test
    window.DEV = () => {
      document.getElementById("mugshot").style.display = "none";
      document.getElementById("banner").style.backgroundImage = `url(./raid.png)`;
      const reason2 = "POLICE ARE RAIDING KNOWN DRUG LOCATIONS";
      const raidStr = `
        <p style="font-size: 1.4em; color: #F44336; margin-top: 2.2em; margin-bottom: -8px; text-align: center;">
          ${reason2}
        </p>`;
      document.getElementById("notification").style.animation =
        "notify 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";
      document.getElementById("reason-text").innerHTML = raidStr;

      setTimeout(() => {
        document.getElementById("notification").style.animation =
          "leave 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) 0s 1 normal forwards";
      }, 17000);
    };
  </script>

  <style>
    html, body {
      height: 100vh; width: 100vw;
      overflow: hidden;
      margin: 0; padding: 0;
    }
    * {
      font-family: sans-serif;
      color: white;
      box-sizing: border-box;
    }
    .root {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .notification {
      position: relative;
      width: 600px;
      height: 356px;
      background-color: rgba(0, 0, 0, 1);
      display: flex;
      flex-direction: column;
      transform: translateX(600px);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      animation-fill-mode: forwards;
    }
    .notification-body {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }
    #banner {
      height: 116px;
      width: 100%;
      background-size: cover;
      background-repeat: no-repeat;
    }
    #mugshot {
      width: 256px;
      height: 256px;
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }
    .reason-outer {
      display: flex;
      padding: 0 8px;
      margin-top: -16px;
      height: 220px;
      width: 100% !important;
      text-align: center;
      align-content: center;
    }
    #reason-text {
      font-size: 1.2em;
      margin: 0;
      width: 100%;
      text-align: center;
    }
    @keyframes notify {
      from { transform: translateX(600px); opacity: 0; }
      to   { transform: translateX(0px);   opacity: 1; }
    }
    @keyframes leave {
      from { transform: translateX(0px);   opacity: 1; }
      to   { transform: translateX(600px); opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="root">
    <div class="notification" id="notification">
      <div id="banner"></div>
      <div class="notification-body" id="notification-body">
        <div id="mugshot"></div>
        <div class="reason-outer">
          <div id="reason" style="width: 100%;">
            <p id="reason-text" style="text-align: center; width: 100%;"></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
